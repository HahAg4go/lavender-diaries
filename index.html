<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Notepad</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8f4ff, #efe5ff);
      color: #4a4359;
    }

    header {
      padding: 2rem;
      text-align: center;
    }

    header h1 {
      color: #9c7bff;
      margin: 0;
    }

    main {
      width: min(90%, 800px);
      margin: 0 auto;
      padding: 2rem 0;
    }

    .quote {
      background: #e9dcff;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #ffffff;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(74, 67, 89, 0.12);
      margin-bottom: 1.5rem;
    }

    .card h2 {
      color: #9c7bff;
      margin-top: 0;
    }

    ol,
    ul {
      display: block;
      list-style-type: none;
      margin: 3px;
      padding: 0;
    }

    button {
      background: #9c7bff;
      color: white;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #8a68f5;
    }
  </style>
</head>

<body>
  <header>
    <h1>Notepad</h1>
  </header>

  <main>
    <section class="quote">
      <p>This is a quote section.</p>
    </section>

    <section class="card">
      <h2>Card Title</h2>
      <p>This is a simple card layout using your purple theme.</p>

      <button type="button">Click Me</button>
    </section>
  </main>
</body>
</html>
